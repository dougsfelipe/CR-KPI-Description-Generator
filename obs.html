<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observation CR Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1e293b;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen">
    <!-- Navbar -->
    <nav class="bg-slate-800 border-b border-slate-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <span class="text-xl font-semibold text-white tracking-wide">CR Description Generator</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Navigation Pills -->
        <div class="flex flex-wrap justify-center gap-4 mb-10">
            <a href="index.html" class="px-6 py-2 rounded-md font-medium text-slate-400 border border-slate-700 hover:bg-slate-800 hover:text-white transition-colors">KPI CR</a>
            <a href="ux.html" class="px-6 py-2 rounded-md font-medium text-slate-400 border border-slate-700 hover:bg-slate-800 hover:text-white transition-colors">Scenario KPI</a>
            <a href="#" class="px-6 py-2 rounded-md font-medium text-white bg-blue-600 shadow border border-blue-500 hover:bg-blue-700 transition-colors">Observation CR</a>
        </div>

        <form id="cr-form" class="space-y-8 bg-slate-800 p-8 rounded-xl shadow-lg border border-slate-700">
            
            <!-- Device information -->
            <div>
                <h2 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4">Device Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="fp" class="block text-sm font-medium text-slate-400 mb-1">Build Fingerprint</label>
                        <input type="text" id="fp" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                    </div>
                    <div>
                        <label for="hw" class="block text-sm font-medium text-slate-400 mb-1">HW Version</label>
                        <input type="text" id="hw" placeholder="PVT" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                    </div>
                    <div>
                        <label for="app" class="block text-sm font-medium text-slate-400 mb-1">App Version <span class="text-slate-500 text-xs">(*if applicable)</span></label>
                        <input type="text" id="app" placeholder="optional" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    </div>
                </div>
            </div>

            <!-- Test Information -->
            <div>
                <h2 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4">Test Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="testSteps" class="block text-sm font-medium text-slate-400 mb-1">Steps to Reproduce</label>
                        <textarea id="testSteps" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none"></textarea>
                    </div>
                    <div>
                        <label for="actualResults" class="block text-sm font-medium text-slate-400 mb-1">Actual Result</label>
                        <textarea id="actualResults" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none"></textarea>
                    </div>
                    <div>
                        <label for="expectResults" class="block text-sm font-medium text-slate-400 mb-1">Expected Result</label>
                        <textarea id="expectResults" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Result Information -->
            <div>
                <h2 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4">Result Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="logs" class="block text-sm font-medium text-slate-400 mb-1">Logs (Bug2Go / etc.)</label>
                        <input type="text" id="logs" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                    </div>
                    <div>
                        <label for="video" class="block text-sm font-medium text-slate-400 mb-1">Videos</label>
                        <input type="text" id="video" placeholder="optional" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                    </div>
                    <div>
                        <label for="information" class="block text-sm font-medium text-slate-400 mb-1">Additional Information</label>
                        <input type="text" id="information" class="w-full bg-slate-900 border border-slate-700 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                    </div>
                </div>
            </div>


            <!-- Action Button -->
            <div class="flex justify-end pt-4 border-t border-slate-700">
                <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md shadow-lg transition-transform transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                    Generate CR Description
                </button>
            </div>
        </form>

        <!-- Result Section -->
        <div class="mt-8 bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700 hidden" id="result-section">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-white">Generated Description</h2>
                <button type="button" id="copy-btn" class="flex items-center space-x-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-slate-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <span id="copy-text">Copy Description</span>
                </button>
            </div>
            <textarea id="result" rows="24" class="w-full bg-slate-900 border border-slate-600 rounded-md py-3 px-4 text-slate-300 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y" readonly></textarea>
        </div>

    </main>

    <script src="obs.js"></script>
</body>
</html>
